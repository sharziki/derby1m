# Derby/1M — VPS deploy. Two services on a private bridge network.
# Only the web container exposes a host port. The api container is internal.
#
#   docker compose up -d --build
#   curl http://localhost:${DERBY_PORT:-3000}/api/health
#
# Set DERBY_PORT in a .env file beside this compose file to choose the host
# port if 3000 is taken.

name: derby1m

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: derby1m-api:latest
    container_name: derby1m-api
    restart: unless-stopped
    # Shared field.json + result.json, refreshed by scraper.
    volumes:
      - ./data:/app/data:ro
    networks:
      - derby1m-net
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: derby1m-web:latest
    container_name: derby1m-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      INTERNAL_API_URL: http://api:8001
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    # Mount data at runtime so scraper writes to field.json show up without a
    # web-image rebuild. Read-only — the web container should never mutate
    # the shared source-of-truth file.
    volumes:
      - ./data:/app/data:ro
    ports:
      - "${DERBY_PORT:-3000}:3000"
    networks:
      - derby1m-net

  # Periodic HRN scraper. Refreshes the projected morning-line odds in
  # data/field.json without clobbering the curated Beyer / aptitude / style
  # fields. One cycle every SCRAPE_INTERVAL_SECONDS (default 4h).
  #
  # On-demand (e.g. from hermes or an operator):
  #   docker compose run --rm -e SCRAPE_ONCE=1 scraper
  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile.scraper
    image: derby1m-scraper:latest
    container_name: derby1m-scraper
    restart: unless-stopped
    volumes:
      - ./data:/data:rw
    environment:
      SCRAPE_INTERVAL_SECONDS: "${SCRAPE_INTERVAL_SECONDS:-14400}"
      SCRAPE_FIELD_JSON: /data/field.json
      SCRAPE_SEED_FIELD: /app/seed-data/field.example.json
    networks:
      - derby1m-net

  # Public HTTPS via Cloudflare's free TryCloudflare quick-tunnel.
  # No account, no auth, no DNS — Cloudflare hands out a random
  # *.trycloudflare.com URL on startup. Find it in the logs:
  #   docker compose logs --tail 30 tunnel | grep trycloudflare
  # The URL is ephemeral — a new one is issued every container restart.
  # For a stable hostname, switch to a named tunnel (needs a Cloudflare
  # account + domain) by replacing the command with:
  #   command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: derby1m-tunnel
    restart: unless-stopped
    depends_on:
      - web
    command: tunnel --no-autoupdate --url http://web:3000 --metrics 0.0.0.0:2000
    networks:
      - derby1m-net

networks:
  derby1m-net:
    name: derby1m-net
    driver: bridge
